<html lang="zh-TW"><head>

<style>

  .order-preview.vip { border-left-color: #f59e0b; }
  .order-preview.cold { border-left-color: #3b82f6; }
  .order-preview.hot { border-left-color: #ef4444; }

  .tag-vip { background: #fef3c7; color: #92400e; }
  .tag-cold { background: #dbeafe; color: #1e40af; }
  .tag-hot { background: #fee2e2; color: #991b1b; }
  .count { font-size: 28px; font-weight: 700; color: #22c55e; }
  .steps { font-size: 13px; margin-top: 16px; line-height: 2; }
  .steps b { color: #1a7a4a; }
</style>
</head><body>

<h1>一鍵派單測試工具</h1>
<p class="sub">注入多樣化測試訂單到 localStorage，然後跳轉到客服系統測試自動派單</p>

<div class="card">
  <h3>目前狀態</h3>
  <div>今日訂單：<span class="count" id="orderCount">0</span> 筆</div>
  <div style="font-size:12px;color:#666;margin-top:4px" id="orderSummary"></div>
</div>

<div class="card">
  <h3>注入測試訂單</h3>
  <p style="font-size:13px;color:#666;margin-bottom:12px">產生 15 筆涵蓋各種情境的訂單：不同商圈、溫層、VIP、時段、大小單</p>
  <button class="btn-green" onclick="injectOrders()" style="width:100%">注入 15 筆測試訂單</button>
</div>

<div class="card">
  <h3>清除 & 重置</h3>
  <div style="display:flex;gap:8px">
    <button class="btn-orange" onclick="clearOrders()" style="flex:1">清除所有訂單</button>
    <button class="btn-gray" onclick="clearTrips()" style="flex:1">清除派單紀錄</button>
  </div>
</div>

<div class="card">
  <h3>前往測試</h3>
  <button class="btn-blue" onclick="goDispatch()" style="width:100%">開啟客服系統 → 派單頁</button>
  <div class="steps">
    <b>步驟：</b><br>
    1. 先按上面「注入 15 筆測試訂單」<br>
    2. 按「開啟客服系統」<br>
    3. 登入（密碼 123123）<br>
    4. 點左側選單「派單」<br>
    5. 點「🚀 一鍵派單」按鈕<br>
    6. 系統自動聚類 → 推薦外送員 → 確認派出
  </div>
</div>

<div class="log" id="log" style="display:none"></div>
<div id="preview"></div>

<script>

var logEl = document.getElementById('log');

function log(msg, cls) {
  logEl.style.display = 'block';
  var s = document.createElement('span'); s.className = cls||''; s.textContent = msg+'\n';
  logEl.appendChild(s); logEl.scrollTop = logEl.scrollHeight;
}

function refreshCount() {
  var orders = JSON.parse(localStorage.getItem('goood_orders') || '[]');
  var todayOrders = orders.filter(function(o){ return o.date === today; });
  document.getElementById('orderCount').textContent = todayOrders.length;

  if (todayOrders.length) {
    var vendors = {};
    todayOrders.forEach(function(o){
      (o.items||[]).forEach(function(i){ vendors[i.vendorId || '?'] = (vendors[i.vendorId || '?']||0)+1; });
    });
    var vip = todayOrders.filter(function(o){ return o.isVIP; }).length;
    var cold = todayOrders.filter(function(o){ return o.tempType==='cold'; }).length;
    var hot = todayOrders.filter(function(o){ return o.tempType==='hot'; }).length;
    var total = todayOrders.reduce(function(s,o){ return s+(o.total||0); },0);
    var txt = '總額 $' + total;
    if (vip) txt += ' | VIP ' + vip + '筆';
    if (cold) txt += ' | 冷藏 ' + cold + '筆';
    if (hot) txt += ' | 熱食 ' + hot + '筆';
    document.getElementById('orderSummary').textContent = txt;
  } else {
    document.getElementById('orderSummary').textContent = '尚無訂單';
  }
}

function showPreview(orders) {
  var el = document.getElementById('preview');
  el.innerHTML = '<div class="card"><h3>訂單預覽</h3>' + orders.map(function(o){
    var cls = 'order-preview';
    if (o.isVIP) cls += ' vip';
    else if (o.tempType==='cold') cls += ' cold';
    else if (o.tempType==='hot') cls += ' hot';
    var tags = '';
    if (o.isVIP) tags += '<span class="tag tag-vip">VIP</span>';
    if (o.tempType==='cold') tags += '<span class="tag tag-cold">冷藏</span>';
    if (o.tempType==='hot') tags += '<span class="tag tag-hot">熱食</span>';
    return '<div class="'+cls+'"><b>'+o.customer+'</b> $'+o.total+' '+o.timeslot+tags+'<br><span style="color:#666">'+o.address+'</span><br><span style="color:#888">'+o.items.map(function(i){return i.name+'×'+i.qty;}).join('、')+'</span></div>';
  }).join('') + '</div>';
}

function clearOrders() {
  localStorage.setItem('goood_orders', '[]');
  log('已清除所有訂單', 'warn');
  refreshCount();
  document.getElementById('preview').innerHTML = '';
}

function clearTrips() {
  // Clear trips from Firebase

    method: 'PUT', headers: {'Content-Type':'application/json'}, body: 'null'
  }).then(function(){ log('已清除 Firebase 派單紀錄（/trips）', 'warn'); })

}

function goDispatch() {
  window.open('index.html', '_blank');
}
